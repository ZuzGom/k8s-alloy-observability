apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: apps
data:
  test.js: |
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    export default function () {
      let res = http.get(__ENV.TARGET_URL);

      check(res, {
        'status is 200': (r) => r.status === 200,
      });

      sleep(1);
    }