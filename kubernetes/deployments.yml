apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: apps
  labels:
    app: sample-app
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: gitopsbook/sample-app:v0.1
          command: ["/app/sample-app"]
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"